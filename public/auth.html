
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSIT Placement Portal Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
}

.login-card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:24px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#0f172a;
}

.logo p{
    color:#64748b;
    margin-top:8px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:12px;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.message{
    margin-top:15px;
    text-align:center;
    color:#64748b;
}

</style>
</head>
<body>

<div class="login-card">

    <div class="logo">
        <h1>PSIT Placement Portal</h1>
        <p>Login with ERP Credentials</p>
    </div>

    <form id="loginForm">

        <div class="form-group">
            <label>University Roll Number</label>
            <input
                type="text"
                id="rollno"
                placeholder="Enter Roll Number"
                required
            >
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >
        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="message" id="message"></div>

</div>

<script>

document
.getElementById("loginForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const username =
        document.getElementById("rollno").value;

    const password =
        document.getElementById("password").value;

    const message =
        document.getElementById("message");

    message.innerHTML = "Checking...";

    try{

        const response = await fetch(
            "https://erp.psit.ac.in/Erp/Auth",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    username,
                    password
                })
            }
        );

        const data = await response.json();
        console.log("DATA: ", data)

        if(data.success){

            message.innerHTML =
            "Login Successful";

            window.location.href =
            "/main.html";

        }else{

            message.innerHTML =
            data.message ||
            "Invalid Credentials";
        }

    }catch(err){

        console.error(err);

        message.innerHTML =
        "Server Error";
    }

});

</script>
</body>
</html>
