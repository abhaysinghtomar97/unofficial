<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="recruiters-section">
    <h2>Our Recruiters</h2>

    <div class="logo-marquee">
        <div class="logo-track" id="logoTrack">
            Loading...
        </div>
    </div>
</div>

<style>
.recruiters-section{
    padding:60px 20px;
    background:#fff;
    text-align:center;
}

.recruiters-section h2{
    font-size:2rem;
    margin-bottom:30px;
    color:#0f172a;
}

.logo-marquee{
    overflow:hidden;
    position:relative;
    width:100%;
}

.logo-track{
    display:flex;
    gap:50px;
    width:max-content;
    animation:scroll 30s linear infinite;
}

.logo-track img{
    height:70px;
    width:auto;
    object-fit:contain;
    filter:grayscale(100%);
    transition:.3s;
}

.logo-track img:hover{
    filter:none;
    transform:scale(1.1);
}

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}
</style>

<script>

async function loadRecruiters(){

    const response = await fetch(
        "https://www.psit.ac.in/assets/_file_json/recruitersLogo.json"
    );

    const data = await response.json();

    const activeLogos = data.filter(
        item => item.home_status === 1 && item.status === 1
    );

    const logoHTML = activeLogos.map(item => `
        <img
            src="https://www.psit.ac.in/assets/webp/psit-recruiters-logo/${item.Logo}"
            alt="${item.Logo}"
            loading="lazy"
        >
    `).join("");

    document.getElementById("logoTrack").innerHTML =
        logoHTML + logoHTML; // duplicate for infinite loop
}

loadRecruiters();

</script>
    
</body>
</html>
