
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Drives</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#f8fafc;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:25px;
}

h1{
    color:#0f172a;
}

.controls{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

select,input{
    padding:10px 14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:14px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.stats{
    margin-bottom:20px;
    font-weight:600;
    color:#334155;
}

.table-wrapper{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 5px 18px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#0f172a;
    color:white;
}

th,td{
    padding:14px;
    text-align:left;
    border-bottom:1px solid #e5e7eb;
}

tbody tr:hover{
    background:#f8fafc;
}

.loading{
    text-align:center;
    padding:30px;
}

@media(max-width:768px){

    body{
        padding:15px;
    }

    .table-wrapper{
        overflow-x:auto;
    }

    table{
        min-width:700px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">

        <h1>Placement Drives</h1>

        <div class="controls">

            <select id="year">
                <option value="">All Years</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
            </select>

            <input
                type="text"
                id="search"
                placeholder="Search company..."
            >

            <button onclick="loadDrives()">
                Load Data
            </button>

        </div>

    </div>

    <div class="stats" id="stats">
        Total Drives: 0
    </div>

    <div class="table-wrapper">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Company</th>
                    <th>Date</th>
                    <th>Year</th>
                    <th>Students</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="tableBody">
                <tr>
                    <td colspan="6" class="loading">
                        Click Load Data
                    </td>
                </tr>
            </tbody>

        </table>

    </div>

</div>

<script>

let allData = [];

async function loadDrives(){

    const tableBody =
        document.getElementById("tableBody");

    tableBody.innerHTML = `
    <tr>
        <td colspan="6" class="loading">
            Loading...
        </td>
    </tr>
    `;

    try{

        const response = await fetch(
            "https://erp.psitche.ac.in/Angular/Placementdrive2025"
        );

        allData = await response.json();

        renderTable();

    }
    catch(err){

        tableBody.innerHTML = `
        <tr>
            <td colspan="6">
                Failed to load data
            </td>
        </tr>
        `;

        console.error(err);
    }
}

function renderTable(){

    const year =
        document.getElementById("year").value;

    const search =
        document.getElementById("search")
        .value
        .toLowerCase();

    let filtered = [...allData];

    if(year){

        filtered = filtered.filter(
            item => item.year == year
        );
    }

    if(search){

        filtered = filtered.filter(
            item =>
            item.Organisation
            .toLowerCase()
            .includes(search)
        );
    }

    document.getElementById("stats")
    .innerHTML =
    `Total Drives: ${filtered.length}`;

    const tableBody =
        document.getElementById("tableBody");

    if(filtered.length === 0){

        tableBody.innerHTML = `
        <tr>
            <td colspan="6">
                No Records Found
            </td>
        </tr>
        `;

        return;
    }

    tableBody.innerHTML =
    filtered.map(item => `

        <tr>

            <td>${item.Id}</td>

            <td>
                <strong>
                    ${item.Organisation}
                </strong>
            </td>

            <td>${item.pdate}</td>

            <td>${item.year}</td>

            <td>
                ${item.No_of_Student || "-"}
            </td>

            <td>
                ${
                    item.isactive == 1
                    ? "Active"
                    : "Inactive"
                }
            </td>

        </tr>

    `).join("");
}

document
.getElementById("year")
.addEventListener(
    "change",
    renderTable
);

document
.getElementById("search")
.addEventListener(
    "input",
    renderTable
);

loadDrives();

</script>

</body>
</html>
